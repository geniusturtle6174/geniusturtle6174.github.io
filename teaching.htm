function renderCourseName(course) {
	const name = isCh || !course.nameEn ? course.name : course.nameEn;
	return course.url ? `<a href="${course.url}">${name}</a>` : name;
}

function renderExamLink(data){
	return data.map(item => 
		`<a href="${item.url}">${isCh||!item.textEn?item.text:item.textEn}</a>`
	).join(', ');
}

function renderFBLink(data){
	if(!data) return '';
	
	// 如果是字串
	const text = isCh ? '期末意見' : 'Final feedbacks';
	if(typeof data === 'string'){
		return `<a href="${data}">${text}</a>`;
	}
	
	// 如果是陣列
	return data.map(item => 
		`<a href="${item.url}">${isCh||!item.textEn?item.text:item.textEn}</a>`
	).join(isCh ? '、' : ', ');
}

function renderTableHead() {
	return `<thead><tr>
		<td>${isCh?"課程類別":"Course Category"}</td>
		<td>${isCh?"授課對象":"Target Audience"}</td>
		<td>${isCh?"開課學期":"Semester"}</td>
		<td>${isCh?"課程名稱":"Course Name"}</td>
		<td>${isCh?"筆試考古題":"Past Exams"}</td>
		<td>${isCh?"教學意見回覆":"Response to Student feedbacks"}</td>
	</tr></thead>`;
}

function renderTableRow(course) {
	return `<tr>
		<td>${isCh || !course.categoryEn ? course.category : course.categoryEn}</td>
		<td>${isCh || !course.schoolEn ? course.school : course.schoolEn}</td>
		<td>${course.semester}</td>
		<td>${renderCourseName(course)}</td>
		<td>${course.pastExams ? renderExamLink(course.pastExams) : ''}</td>
		<td>${course.feedbacks ? renderFBLink(course.feedbacks) : ''}</td>
	</tr>`;
}

function renderTableBySemester(courses) {
	const sorted = [...courses].sort((a, b) => b.semcode - a.semcode);
	const html = `<table>
		${renderTableHead()}
		<tbody>
			${sorted.map(course => renderTableRow(course)).join('')}
		</tbody>
	</table>`;
	document.getElementById('table-container').innerHTML = html;
}

function renderTableByCategory(courses) {
	const grouped = {};
	courses.forEach(course => {
		if (!grouped[course.category]) {
			grouped[course.category] = [];
		}
		grouped[course.category].push(course);
	});

	// 按 categoryOrder 排序，未定義的放最後
	const sortedCategories = Object.keys(grouped).sort((a, b) => {
		const indexA = categoryOrder.indexOf(a);
		const indexB = categoryOrder.indexOf(b);
		const orderA = indexA === -1 ? 999 : indexA;
		const orderB = indexB === -1 ? 999 : indexB;
		return orderA - orderB;
	});

	// 生成快速跳轉
	const jumpLinks = sortedCategories.map(category => 
		`<a href="#cat-${encodeURIComponent(category)}" target='_self'>${category}</a>`
	).join(' | ');

	// 生成各類別的表格
	const tables = sortedCategories.map(category => {
		const categoryCourses = grouped[category].sort((a, b) => b.semcode - a.semcode);

		return `
			<div class="h3-wrapper">
				<h3 id="cat-${encodeURIComponent(category)}">${category} (${categoryCourses.length} ${isCh?"門":"courses"})</h3>
				<a href="#top" class="back-to-top-link" target="_self">↑ ${isCh?"回到頁面頂端":"Back to Top"}</a>
			</div>
			<table>
			${renderTableHead()}
			<tbody>${categoryCourses.map(course => renderTableRow(course)).join('')}</tbody>
			</table>
		`;
	}).join('');

	const html = `<div class="quick-jump">${isCh?"快速跳轉":"Jump to"}: ${jumpLinks}</div>${tables}`;

	document.getElementById('table-container').innerHTML = html;
}

document.querySelectorAll('[data-sort]').forEach(btn => {
	btn.addEventListener('click', (e) => {
		const sortType = e.target.dataset.sort;
		const params = new URLSearchParams(window.location.search);
		params.set('sort', sortType);
		window.history.pushState({}, '', `?${params.toString()}`);
		// 移除所有按鈕的 active 狀態
		document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
		// 當前按鈕加上 active
		e.target.classList.add('active');
		// 渲染
		renderLanguageSwitcher();
		renderCourses(sortType);
	});
});

function renderCourses(sortType) {
	switch(sortType) {
		case 'semester':
			renderTableBySemester(courses);
			break;
		case 'category':
			renderTableByCategory(courses);
			break;
		case 'school':
			// 未來實作
			break;
	}
}

function updateButtonTexts() {
	document.getElementById('sort-label').textContent = isCh ? '排序方式:' : 'Sort by:';
	document.getElementById('btn-semester').textContent = isCh ? '依學期' : 'Semester';
	document.getElementById('btn-category').textContent = isCh ? '依類別' : 'Category';
	// document.getElementById('btn-school').textContent = isCh ? '依學校' : 'By School';
}

	const params = new URLSearchParams();
	params.set('sort', currentSort);

	const html = `<div class="lang-switcher">
		${isCh ? 
		`<span>正體中文版</span> | <a href="?lang=en&${params.toString()}" target='_self'>English</a>` :
		`<a href="?lang=ch&${params.toString()}" target='_self'>正體中文版</a> | <span>English</span>`
		}
	</div>`;
	document.getElementById('lang-switcher').innerHTML = html;
}

// 初始化（預設依學期排序）
window.addEventListener('DOMContentLoaded', () => {
	renderLanguageSwitcher();
	updateButtonTexts();

	const currSort = getCurrentSort();
	document.querySelectorAll('[data-sort]').forEach(btn => {
		if (btn.dataset.sort === currSort) {
			btn.classList.add('active');
		} else {
			btn.classList.remove('active');
		}
	});
	renderCourses(currSort);
});

</script>
